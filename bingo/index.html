<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Bingo Game</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.container{
    text-align:center;
    padding:20px;
}

.bingo-word{
    font-size:42px;
    font-weight:bold;
    letter-spacing:15px;
    margin-bottom:15px;
}

.bingo-word span{
    display:inline-block;
    padding:5px;
}

.strike{
    color:red;
    text-decoration:line-through;
}

#winner{
    color:green;
    height:40px;
    margin:10px 0;
}

.grid{
    display:grid;
    grid-template-columns:repeat(5,70px);
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
}

.grid input,
.grid button{
    width:70px;
    height:70px;
    font-size:20px;
    text-align:center;
    border:2px solid #ccc;
    border-radius:8px;
}

.grid input{
    cursor:text;
}

.grid button{
    cursor:pointer;
}

.red{
    background:red;
    color:white;
}

.completed{
    background:#8b0000;
    color:white;
    opacity:0.8;
    cursor:not-allowed;
}

.controls{
    margin-top:15px;
}

.controls button{
    padding:10px 20px;
    font-size:16px;
    margin:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

    <div id="bingoWord" class="bingo-word">
        <span id="b0">B</span>
        <span id="b1">I</span>
        <span id="b2">N</span>
        <span id="b3">G</span>
        <span id="b4">O</span>
    </div>

    <h2 id="winner"></h2>

    <div id="grid" class="grid"></div>

    <div class="controls">
        <button id="randomBtn">Random Fill</button>
        <button id="submitBtn">Submit</button>
        <button id="resetBtn">Reset</button>
    </div>

</div>

<script>

const grid = document.getElementById('grid');
const submitBtn = document.getElementById('submitBtn');
const resetBtn = document.getElementById('resetBtn');
const randomBtn = document.getElementById('randomBtn');

let completedLines = 0;
let alreadyCompleted = new Set();

function createInputs(){

    completedLines = 0;
    alreadyCompleted.clear();

    document.getElementById('winner').innerHTML='';

    for(let i=0;i<5;i++)
        document.getElementById('b'+i)
            .classList.remove('strike');

    grid.innerHTML='';

    for(let i=0;i<25;i++){

        const input=document.createElement('input');

        input.type='number';
        input.min=1;
        input.max=25;

        input.addEventListener('change',function(){

            const value=this.value;

            if(value==='') return;

            if(value<1 || value>25){
                alert('Enter number between 1 and 25');
                this.value='';
                return;
            }

            const inputs=[
                ...grid.querySelectorAll('input')
            ];

            const duplicate=inputs.some(inp=>
                inp!==this &&
                inp.value!=='' &&
                inp.value===value
            );

            if(duplicate){
                alert('Duplicate numbers not allowed');
                this.value='';
            }
        });

        grid.appendChild(input);
    }
}

createInputs();

randomBtn.addEventListener('click',()=>{

    const inputs=[
        ...grid.querySelectorAll('input')
    ];

    if(inputs.length===0) return;

    const numbers=[];

    for(let i=1;i<=25;i++)
        numbers.push(i);

    for(let i=numbers.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [numbers[i],numbers[j]]=
        [numbers[j],numbers[i]];
    }

    inputs.forEach((input,index)=>{
        input.value=numbers[index];
    });
});

submitBtn.addEventListener('click',()=>{

    const inputs=[
        ...grid.querySelectorAll('input')
    ];

    if(inputs.length===0) return;

    const values=inputs.map(i=>i.value);

    if(values.includes('')){
        alert('Please fill all 25 boxes');
        return;
    }

    if(new Set(values).size!==25){
        alert('Numbers must be unique');
        return;
    }

    grid.innerHTML='';

    values.forEach((val,index)=>{

        const btn=document.createElement('button');

        btn.textContent=val;
        btn.dataset.index=index;

        btn.addEventListener('click',function(){

            if(this.disabled) return;

            this.classList.add('red');

            checkCompleted();
        });

        grid.appendChild(btn);
    });
});

function checkCompleted(){

    const buttons=[
        ...grid.querySelectorAll('button')
    ];

    const lines=[];

    // rows
    for(let r=0;r<5;r++){
        lines.push([
            r*5,
            r*5+1,
            r*5+2,
            r*5+3,
            r*5+4
        ]);
    }

    // columns
    for(let c=0;c<5;c++){
        lines.push([
            c,
            c+5,
            c+10,
            c+15,
            c+20
        ]);
    }

    // diagonals
    lines.push([0,6,12,18,24]);
    lines.push([4,8,12,16,20]);

    lines.forEach((line,index)=>{

        if(alreadyCompleted.has(index))
            return;

        const complete=line.every(i=>
            buttons[i]
            .classList
            .contains('red')
        );

        if(complete){

            alreadyCompleted.add(index);
            completedLines++;

            if(completedLines<=5){
                document
                    .getElementById(
                        'b'+(completedLines-1)
                    )
                    .classList
                    .add('strike');
            }

            line.forEach(i=>{
                buttons[i].disabled=true;
                buttons[i]
                    .classList
                    .add('completed');
            });

            if(completedLines===5){

                document
                    .getElementById('winner')
                    .innerHTML=
                    '🎉 BINGO! YOU WIN! 🎉';

                buttons.forEach(btn=>{
                    btn.disabled=true;
                });
            }
        }
    });
}

resetBtn.addEventListener('click',()=>{
    createInputs();
});

</script>

</body>
</html>
