<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:30px;
    color:#333;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:15px;
    min-width:300px;
}

button{
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#1976d2;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
    opacity:0.9;
}
</style>
</head>
<body>

<div class="container">

    <h1>My Games</h1>

    <div class="buttons">

        <button onclick="location.href='./bingo/'">
            Bingo
        </button>

        <button onclick="location.href='./randomenum/'">
            Random Numbers
        </button>

    </div>

</div>

</body>
</html>
